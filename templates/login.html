{% extends "base.html" %}
{% block title %}Login - Loyalty Cards{% endblock %}
{% block content %}
<div style="max-width:380px;margin:80px auto;text-align:center;">
    <div style="font-size:2.5rem;margin-bottom:8px;">&#9733;</div>
    <h1 style="margin-bottom:8px;">Loyalty Cards</h1>
    <p style="color:var(--text-light);margin-bottom:32px;">Staff login</p>
    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>PIN</label>
                <input type="password" name="pin" required placeholder="Enter PIN" inputmode="numeric">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Log In</button>
        </form>
    </div>
</div>
{% endblock %}
