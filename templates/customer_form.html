{% extends "base.html" %}
{% block title %}{{ 'Edit' if editing else 'New' }} Customer - Loyalty Cards{% endblock %}
{% block content %}
<h1>{{ 'Edit' if editing else 'New' }} Customer</h1>
<div class="card">
    <form method="POST">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" name="first_name" required value="{{ customer['first_name'] if editing else '' }}" placeholder="First name">
            </div>
            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" name="last_name" required value="{{ customer['last_name'] if editing else '' }}" placeholder="Last name">
            </div>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" value="{{ customer['phone'] if editing and customer['phone'] else '' }}" placeholder="Phone number">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ customer['email'] if editing and customer['email'] else '' }}" placeholder="Email address">
        </div>
        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob" value="{{ customer['dob'] if editing and customer['dob'] else '' }}">
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-primary">{{ 'Update' if editing else 'Add Customer' }}</button>
            {% if not editing %}
            <button type="submit" name="issue_card" value="1" class="btn btn-success">Add & Issue Card</button>
            {% endif %}
            <a href="{{ url_for('customers') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
